name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Package version without v
        required: true
        default: '1.2.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build unsigned installer
        run: zsh ./build-pkg.sh "${{ steps.version.outputs.version }}"

      - name: Create checksum
        shell: bash
        run: |
          cd build
          shasum -a 256 "MagSafeDark-${{ steps.version.outputs.version }}-unsigned.pkg" \
            > "MagSafeDark-${{ steps.version.outputs.version }}-unsigned.pkg.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagSafeDark-${{ steps.version.outputs.version }}
          path: |
            build/MagSafeDark-${{ steps.version.outputs.version }}-unsigned.pkg
            build/MagSafeDark-${{ steps.version.outputs.version }}-unsigned.pkg.sha256

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: MagSafe Dark ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            build/MagSafeDark-${{ steps.version.outputs.version }}-unsigned.pkg
            build/MagSafeDark-${{ steps.version.outputs.version }}-unsigned.pkg.sha256
